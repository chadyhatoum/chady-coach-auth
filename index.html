<!DOCTYPE html>
<html>
<head><title>Chady Coach Auth</title></head>
<body style="font-family:sans-serif;padding:20px;max-width:500px;margin:0 auto">
<script>
const hash = window.location.hash.substring(1);
const params = new URLSearchParams(hash);
const token = params.get('access_token');
if (token) {
  document.body.innerHTML =
    '<h3 style="color:green">✓ Signed in</h3>' +
    '<p>Click Copy, then paste into the app:</p>' +
    '<textarea id="t" style="width:100%;height:60px;font-size:10px;font-family:monospace">' + token + '</textarea><br>' +
    '<button onclick="navigator.clipboard.writeText(document.getElementById(\'t\').value);this.textContent=\'✓ Copied!\';this.style.background=\'green\'" style="margin-top:8px;padding:8px 16px;background:#0C447C;color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px">Copy Token</button>';
} else {
  document.body.innerHTML = '<p style="color:#999">Ready for authentication.</p>';
}
</script>
</body>
</html>
