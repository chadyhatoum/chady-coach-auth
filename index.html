<!DOCTYPE html>
<html>
<head><title>Chady Coach Auth</title></head>
<body style="font-family:sans-serif;padding:20px;max-width:500px;margin:0 auto">
<script>
const hash = window.location.hash.substring(1);
const params = new URLSearchParams(hash);
const token = params.get('access_token');
if (token) {
  document.body.innerHTML = 
    '<h3 style="color:green">✓ Signed in successfully</h3>' +
    '<p>Copy the code below and paste it into the app:</p>' +
    '<textarea id="t" style="width:100%;height:80px;font-size:11px;font-family:monospace">' + token + '</textarea>' +
    '<br><button onclick="document.getElementById(\'t\').select();document.execCommand(\'copy\');this.textContent=\'Copied!\'" style="margin-top:8px;padding:8px 16px;background:#0C447C;color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px">Copy Code</button>';
} else {
  document.body.innerHTML = '<p style="color:#999">Ready for authentication.</p>';
}
</script>
</body>
</html>
